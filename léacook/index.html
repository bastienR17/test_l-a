<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Léacook — Site complet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="bonbon-shared.jsx"></script>
<script type="text/babel" src="bonbon-home.jsx"></script>
<script type="text/babel" src="bonbon-carte.jsx"></script>
<script type="text/babel" src="bonbon-detail.jsx"></script>
<script type="text/babel" src="bonbon-order.jsx"></script>
<script type="text/babel" src="bonbon-mobile.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="desktop"
        title="Site complet — desktop"
        subtitle="4 pages clés du parcours utilisateur. Cliquer l'icône d'expansion pour le plein écran."
      >
        <DCArtboard id="home"   label="01 · Accueil"        width={1280} height={5500}>
          <BonbonHome />
        </DCArtboard>
        <DCArtboard id="carte"  label="02 · La carte"       width={1280} height={2900}>
          <BonbonCarte />
        </DCArtboard>
        <DCArtboard id="detail" label="03 · Détail gâteau"  width={1280} height={2500}>
          <BonbonDetail />
        </DCArtboard>
        <DCArtboard id="order"  label="04 · Commander"      width={1280} height={2000}>
          <BonbonOrder />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="mobile"
        title="Site complet — mobile (390px)"
        subtitle="Mêmes pages, version smartphone"
      >
        <DCArtboard id="m-home"  label="01 · Accueil"     width={390} height={2700}>
          <BonbonHomeMobile />
        </DCArtboard>
        <DCArtboard id="m-carte" label="02 · La carte"    width={390} height={1480}>
          <BonbonCarteMobile />
        </DCArtboard>
        <DCArtboard id="m-order" label="03 · Commander"   width={390} height={1100}>
          <BonbonOrderMobile />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
